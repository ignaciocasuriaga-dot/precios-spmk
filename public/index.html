const SUPERS = ['Tata','Disco','Tienda Inglesa','El Dorado'];
const BIMBO_BRANDS = new Set(['Bimbo','Artesano','Nutrabien','Tia Rosa','Los Sorchantes','Rapiditas','Salmas','Merienda Hit','Takis']);
const CATEGORIES = ['Pan de Molde','Pan de Tortuga','Pan de Viena'];
const SUPER_COLORS = {
  'Tata':'bg-orange-100 text-orange-800 border-orange-200',
  'Disco':'bg-purple-100 text-purple-800 border-purple-200',
  'Tienda Inglesa':'bg-red-100 text-red-800 border-red-200',
  'El Dorado':'bg-yellow-100 text-yellow-800 border-yellow-200',
};
let activeCategory = 'Pan de Molde';
let activeTab = 'bimbo';

function detectCategory(name, brand) {
  const n = (name+' '+(brand||'')).toLowerCase();
  if (n.includes('tortuga')||n.includes('hamburguesa')||n.includes('hot dog')||n.includes('hotdog')||n.includes('perrito')) return 'Pan de Tortuga';
  if (n.includes('viena')||n.includes('vienes')||n.includes('vienés')||n.includes('frances')||n.includes('francés')||n.includes('baguette')||n.includes('sorchante')||n.includes('cubano')||n.includes('criollito')||n.includes('pan franc')) return 'Pan de Viena';
  if (n.includes('lactal')||n.includes('molde')||n.includes('sandwich')||n.includes('integral')||n.includes('blanco')||n.includes('artesano')||n.includes('nutrabien')||n.includes('brioche')||n.includes('tia rosa')||n.includes('tiarosa')||n.includes('bauducco')||n.includes('fargo')||n.includes('magnific')) return 'Pan de Molde';
  if (n.includes('rapidita')||n.includes('salma')||n.includes('takis')||n.includes('merienda hit')) return 'Otro';
  if (brand==='Bimbo'||brand==='Artesano'||brand==='Nutrabien'||brand==='Tia Rosa'||brand==='Bauducco'||brand==='Fargo'||brand==='Magnific') return 'Pan de Molde';
  if (brand==='Los Sorchantes'||brand==='Maestro Cubano') return 'Pan de Viena';
  if (brand==='Marca Propia'||brand==='Precio Líder') return 'Pan de Molde';
  return 'Otro';
}

function fmt(n) { return n!=null ? '$'+Math.round(n).toLocaleString('es-UY') : '—'; }

function superBadge(s) {
  const c = SUPER_COLORS[s]||'bg-gray-100 text-gray-700 border-gray-200';
  return '<span class="text-xs px-2 py-0.5 rounded-full font-medium border '+c+'">'+s+'</span>';
}

function superTag(s) {
  const c = SUPER_COLORS[s]||'bg-gray-100 text-gray-800 border-gray-200';
  return '<span class="text-xs px-2.5 py-1 rounded-full font-bold border '+c+'">'+s+'</span>';
}

function init() {
  document.getElementById('stat-total').textContent = PRODUCTS.length;
  document.getElementById('stat-brands').textContent = new Set(PRODUCTS.map(p=>p.brand)).size;
  document.getElementById('stat-supers').textContent = new Set(PRODUCTS.map(p=>p.supermarket)).size+'/4';
  const offers = PRODUCTS.filter(p=>p.offerPrice);
  document.getElementById('stat-offers').textContent = offers.length;
  document.getElementById('badge-ofertas').textContent = offers.length||'';
  if (PRODUCTS.length) {
    const d = new Date(PRODUCTS[0].scrapedAt);
    document.getElementById('lastUpdate').textContent = d.toLocaleString('es-UY',{dateStyle:'medium',timeStyle:'short'});
  }
  renderBimbo();
  renderCatalogo();
  renderOfertas();
}

function setTab(t) {
  activeTab = t;
  ['bimbo','catalogo','ofertas'].forEach(id => {
    const btn = document.getElementById('tab-'+id);
    const cont = document.getElementById('content-'+id);
    if (id===t) {
      btn.classList.add('border-red-600','text-red-600');
      btn.classList.remove('border-transparent','text-gray-500');
      cont.style.display='';
    } else {
      btn.classList.remove('border-red-600','text-red-600');
      btn.classList.add('border-transparent','text-gray-500');
      cont.style.display='none';
    }
  });
}

function setCat(cat) {
  activeCategory = cat;
  renderBimbo();
  CATEGORIES.forEach(c => {
    const btn = document.getElementById('catbtn-'+c.replace(/ /g,'_'));
    if (btn) {
      btn.className = (c===cat ? 'tab-active' : 'tab-inactive')+' px-4 py-2 rounded-xl text-sm font-semibold transition-all border';
      const badge = btn.querySelector('span');
      if (badge) badge.className = 'ml-2 text-xs px-1.5 py-0.5 rounded-full '+(c===cat?'bg-red-500 text-white':'bg-gray-100 text-gray-400');
    }
  });
}

function renderBimbo() {
  const cat = activeCategory;
  const catProds = PRODUCTS.filter(p => detectCategory(p.name, p.brand) === cat);
  const catCounts = Object.fromEntries(CATEGORIES.map(c=>[c, PRODUCTS.filter(p=>detectCategory(p.name,p.brand)===c).length]));

  // Per-supermarket ranked analysis
  const superAnalyses = SUPERS.map(sup => {
    const superProds = catProds.filter(p => p.supermarket === sup);
    const brandMap = {};
    for (const p of superProds) {
      if (!brandMap[p.brand] || p.publishedPrice < brandMap[p.brand].publishedPrice) brandMap[p.brand] = p;
    }
    const ranked = Object.entries(brandMap)
      .sort(([,a],[,b]) => a.publishedPrice - b.publishedPrice)
      .map(([brand, product], i) => ({ brand, product, rank: i+1, isBimbo: BIMBO_BRANDS.has(brand) }));
    const bimboEntries = ranked.filter(r => r.isBimbo);
    const bestBimboRank = bimboEntries.length > 0 ? Math.min(...bimboEntries.map(r=>r.rank)) : null;
    return { sup, ranked, bimboEntries, totalBrands: ranked.length, bimboPresent: bimboEntries.length > 0, bestBimboRank };
  });

  // Insights
  const bimboP = catProds.filter(p=>BIMBO_BRANDS.has(p.brand));
  const compP = catProds.filter(p=>!BIMBO_BRANDS.has(p.brand));
  const supersPresent = superAnalyses.filter(s=>s.bimboPresent).length;
  const supersFirst = superAnalyses.filter(s=>s.bestBimboRank===1).length;
  const bimboOffers = bimboP.filter(p=>p.offerPrice).length;
  const compOffers = compP.filter(p=>p.offerPrice).length;
  const bimboAvg = bimboP.length ? Math.round(bimboP.reduce((s,p)=>s+p.publishedPrice,0)/bimboP.length) : null;
  const compAvg = compP.length ? Math.round(compP.reduce((s,p)=>s+p.publishedPrice,0)/compP.length) : null;
  const priceDiff = bimboAvg&&compAvg ? Math.round(((bimboAvg-compAvg)/compAvg)*100) : null;

  let html = '';

  // Category buttons
  html += '<div class="flex gap-2 flex-wrap mb-5">';
  for (const c of CATEGORIES) {
    const id = 'catbtn-'+c.replace(/ /g,'_');
    const isCur = c===cat;
    html += '<button id="'+id+'" onclick="setCat(\'' +c+ '\')" class="'+(isCur?'tab-active':'tab-inactive')+' px-4 py-2 rounded-xl text-sm font-semibold transition-all border">'+c;
    html += '<span class="ml-2 text-xs px-1.5 py-0.5 rounded-full '+(isCur?'bg-red-500 text-white':'bg-gray-100 text-gray-400')+'">'+catCounts[c]+'</span></button>';
  }
  html += '</div>';

  if (catProds.length===0) {
    html += '<div class="bg-white rounded-2xl border border-gray-200 p-12 text-center text-gray-400"><div class="text-4xl mb-3">🍞</div><p>No hay productos de <strong>'+cat+'</strong> en los datos actuales.</p></div>';
    document.getElementById('content-bimbo').innerHTML = html;
    return;
  }

  // Insight cards
  html += '<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">';
  // Presencia
  html += '<div class="bg-blue-50 border border-blue-200 rounded-xl p-4">';
  html += '<div class="text-xs font-bold text-blue-600 uppercase tracking-wider mb-1">Presencia Bimbo</div>';
  html += '<div class="text-2xl font-black text-blue-700">'+supersPresent+'/4</div>';
  html += '<div class="text-xs text-blue-500 mt-1">supermercados con productos</div></div>';
  // Más barato
  const greenPos = supersFirst>0;
  html += '<div class="border rounded-xl p-4 '+(greenPos?'bg-green-50 border-green-200':'bg-white border-gray-200')+'">';
  html += '<div class="text-xs font-bold text-green-600 uppercase tracking-wider mb-1">Más barato</div>';
  html += '<div class="text-2xl font-black '+(greenPos?'text-green-700':'text-gray-400')+'">'+supersFirst+'/4</div>';
  html += '<div class="text-xs text-green-500 mt-1">supers donde Bimbo es #1</div></div>';
  // Precio vs comp
  const diffColor = priceDiff!==null&&priceDiff>5?'bg-orange-50 border-orange-200':priceDiff!==null&&priceDiff<-5?'bg-green-50 border-green-200':'bg-white border-gray-200';
  html += '<div class="border rounded-xl p-4 '+diffColor+'">';
  html += '<div class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Precio vs Comp.</div>';
  if (priceDiff!==null) {
    const dc = priceDiff>5?'text-orange-600':priceDiff<-5?'text-green-600':'text-gray-700';
    html += '<div class="text-2xl font-black '+dc+'">'+(priceDiff>0?'+':'')+priceDiff+'%</div>';
    html += '<div class="text-xs text-gray-400 mt-1">B: '+fmt(bimboAvg)+' · C: '+fmt(compAvg)+'</div>';
  } else html += '<div class="text-gray-400 text-sm">Sin comparativa</div>';
  html += '</div>';
  // Ofertas
  html += '<div class="border rounded-xl p-4 '+(bimboOffers>0?'bg-orange-50 border-orange-200':'bg-white border-gray-200')+'">';
  html += '<div class="text-xs font-bold text-orange-600 uppercase tracking-wider mb-1">Ofertas activas</div>';
  html += '<div class="text-2xl font-black text-orange-600">'+(bimboOffers+compOffers)+'</div>';
  html += '<div class="text-xs text-orange-500 mt-1">Bimbo: '+bimboOffers+' · Comp: '+compOffers+'</div></div>';
  html += '</div>';

  // Super a super panels 2x2
  html += '<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-5">';
  for (const sa of superAnalyses) {
    html += '<div class="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm">';
    // Header
    html += '<div class="px-5 py-3.5 border-b border-gray-100 flex items-center justify-between">';
    html += '<div class="flex items-center gap-2.5">'+superTag(sa.sup)+'<span class="text-xs text-gray-400">'+sa.totalBrands+' '+(sa.totalBrands===1?'marca':'marcas')+'</span></div>';
    if (!sa.bimboPresent) {
      html += '<span class="text-xs bg-gray-100 text-gray-500 px-2.5 py-1 rounded-full font-semibold">Bimbo ausente</span>';
    } else {
      const rk = sa.bestBimboRank;
      const rc = rk===1?'bg-green-100 text-green-700':rk<=3?'bg-yellow-100 text-yellow-700':'bg-red-50 text-red-600';
      html += '<span class="text-xs px-2.5 py-1 rounded-full font-bold '+rc+'">Bimbo #'+rk+' de '+sa.totalBrands+'</span>';
    }
    html += '</div>';
    // Ranked rows
    if (sa.ranked.length===0) {
      html += '<div class="px-5 py-8 text-center text-gray-300 text-sm">Sin productos en esta categoría</div>';
    } else {
      html += '<div class="divide-y divide-gray-50">';
      for (const {brand, product, rank, isBimbo} of sa.ranked) {
        const rkColor = rank===1?'bg-green-100 text-green-700':rank===2?'bg-blue-50 text-blue-500':rank===sa.ranked.length&&sa.ranked.length>2?'bg-red-50 text-red-400':'bg-gray-100 text-gray-500';
        html += '<div class="px-4 py-3 flex items-center gap-3 '+(isBimbo?'bg-red-50/40':'')+'">';
        html += '<div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-black flex-shrink-0 '+rkColor+'">'+rank+'</div>';
        html += '<div class="flex-1 min-w-0">';
        html += '<div class="flex items-center gap-1.5 flex-wrap"><span class="text-sm font-bold '+(isBimbo?'text-red-700':'text-gray-700')+'">'+brand+'</span>';
        if (isBimbo) html += '<span class="text-xs bg-red-100 text-red-600 px-1.5 py-0.5 rounded font-bold">Bimbo</span>';
        html += '</div>';
        html += '<a href="'+(product.url||'#')+'" target="_blank" class="text-xs text-gray-400 truncate block hover:text-blue-500 max-w-full" title="'+product.name+'">'+product.name+'</a>';
        html += '</div>';
        html += '<div class="text-right flex-shrink-0">';
        html += '<div class="font-black text-sm '+(isBimbo?'text-red-800':'text-gray-800')+'">'+fmt(product.publishedPrice)+'</div>';
        if (product.offerPrice) {
          html += '<div class="text-xs text-gray-400 line-through leading-none">'+fmt(product.regularPrice)+'</div>';
          html += '<span class="text-xs bg-orange-100 text-orange-600 px-1 rounded font-bold">-'+product.discount+'%</span>';
        }
        html += '</div></div>';
      }
      html += '</div>';
    }
    html += '</div>';
  }
  html += '</div>';

  // Detail table
  html += '<div class="bg-white rounded-2xl border border-gray-200 overflow-hidden">';
  html += '<div class="px-5 py-3.5 border-b border-gray-100"><h3 class="font-bold text-gray-800 text-sm">Todos los productos — '+cat+'</h3>';
  html += '<p class="text-xs text-gray-400 mt-0.5">'+catProds.length+' productos encontrados</p></div>';
  html += '<div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50 border-b border-gray-100"><tr>';
  for (const h of ['Producto','Marca','Supermercado','Precio','Regular','Dto.']) {
    const r = ['Precio','Regular','Dto.'].includes(h)?'text-right':'text-left';
    html += '<th class="px-3 py-2.5 text-xs font-semibold text-gray-500 uppercase tracking-wider '+r+'">'+h+'</th>';
  }
  html += '</tr></thead><tbody class="divide-y divide-gray-50">';
  const sorted = [...catProds].sort((a,b)=>a.supermarket.localeCompare(b.supermarket,'es')||a.publishedPrice-b.publishedPrice);
  for (const p of sorted) {
    const isBimbo = BIMBO_BRANDS.has(p.brand);
    html += '<tr class="hover:bg-blue-50/20 transition-colors '+(isBimbo?'bg-red-50/20':'')+'">';
    html += '<td class="px-3 py-2.5 max-w-52"><a href="'+(p.url||'#')+'" target="_blank" class="font-medium text-gray-800 hover:text-blue-600 text-xs" title="'+p.name+'">'+p.name+'</a></td>';
    html += '<td class="px-3 py-2.5"><span class="text-xs px-2 py-0.5 rounded-full font-semibold '+(isBimbo?'bg-red-100 text-red-700':'bg-gray-100 text-gray-600')+'">'+p.brand+'</span></td>';
    html += '<td class="px-3 py-2.5">'+superBadge(p.supermarket)+'</td>';
    html += '<td class="px-3 py-2.5 text-right font-semibold text-gray-900">'+fmt(p.publishedPrice)+'</td>';
    html += '<td class="px-3 py-2.5 text-right text-gray-400 text-xs">'+fmt(p.regularPrice)+'</td>';
    html += '<td class="px-3 py-2.5 text-right">'+(p.discount?'<span class="bg-green-100 text-green-700 text-xs px-1.5 py-0.5 rounded font-bold">-'+p.discount+'%</span>':'<span class="text-gray-200">—</span>')+'</td>';
    html += '</tr>';
  }
  html += '</tbody></table></div></div>';

  document.getElementById('content-bimbo').innerHTML = html;
}

function renderCatalogo() {
  let html = '<div class="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm">';
  html += '<div class="p-4 border-b border-gray-100"><input type="text" id="catSearch" oninput="filterCat()" placeholder="🔍 Buscar producto o marca..." class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm w-full focus:outline-none focus:ring-2 focus:ring-blue-500"></div>';
  html += '<div class="overflow-x-auto"><table class="w-full text-sm" id="catTable">';
  html += '<thead class="bg-gray-50 border-b border-gray-100"><tr>';
  for (const h of ['Producto','Marca','Supermercado','Precio','Regular','Oferta','Dto.']) {
    const r = !['Producto','Marca','Supermercado'].includes(h)?'text-right':'text-left';
    html += '<th class="px-3 py-2.5 text-xs font-semibold text-gray-500 uppercase tracking-wider '+r+'">'+h+'</th>';
  }
  html += '</tr></thead><tbody class="divide-y divide-gray-50">';
  const sorted = [...PRODUCTS].sort((a,b)=>a.brand.localeCompare(b.brand,'es')||a.name.localeCompare(b.name,'es')||a.supermarket.localeCompare(b.supermarket,'es'));
  for (const p of sorted) {
    const isBimbo = BIMBO_BRANDS.has(p.brand);
    html += '<tr class="cat-row hover:bg-blue-50/20 transition-colors '+(isBimbo?'bg-red-50/20':'')+'" data-search="'+(p.name+' '+p.brand+' '+p.supermarket).toLowerCase()+'">';
    html += '<td class="px-3 py-2.5 max-w-52"><a href="'+(p.url||'#')+'" target="_blank" class="font-medium text-gray-800 hover:text-blue-600 text-xs">'+p.name+'</a></td>';
    html += '<td class="px-3 py-2.5"><span class="text-xs px-2 py-0.5 rounded-full font-semibold '+(isBimbo?'bg-red-100 text-red-700':'bg-gray-100 text-gray-600')+'">'+p.brand+'</span></td>';
    html += '<td class="px-3 py-2.5">'+superBadge(p.supermarket)+'</td>';
    html += '<td class="px-3 py-2.5 text-right font-semibold text-gray-900">'+fmt(p.publishedPrice)+'</td>';
    html += '<td class="px-3 py-2.5 text-right text-gray-400 text-xs">'+fmt(p.regularPrice)+'</td>';
    html += '<td class="px-3 py-2.5 text-right text-green-600 font-medium text-xs">'+fmt(p.offerPrice)+'</td>';
    html += '<td class="px-3 py-2.5 text-right">'+(p.discount?'<span class="bg-green-100 text-green-700 text-xs px-1.5 py-0.5 rounded font-bold">-'+p.discount+'%</span>':'<span class="text-gray-200">—</span>')+'</td>';
    html += '</tr>';
  }
  html += '</tbody></table></div></div>';
  document.getElementById('content-catalogo').innerHTML = html;
}

function filterCat() {
  const q = document.getElementById('catSearch').value.toLowerCase();
  document.querySelectorAll('.cat-row').forEach(r => {
    r.style.display = r.dataset.search.includes(q) ? '' : 'none';
  });
}

function renderOfertas() {
  const offers = PRODUCTS.filter(p=>p.offerPrice&&p.discount).sort((a,b)=>(b.discount||0)-(a.discount||0));
  if (!offers.length) {
    document.getElementById('content-ofertas').innerHTML = '<div class="text-center py-16 text-gray-400"><div class="text-4xl mb-3">🏷️</div><p>No hay ofertas activas.</p></div>';
    return;
  }
  let html = '<p class="text-sm text-gray-500 mb-4">'+offers.length+' productos con descuento activo, ordenados por mayor ahorro.</p>';
  html += '<div class="bg-white rounded-2xl border border-gray-200 overflow-hidden"><table class="w-full text-sm">';
  html += '<thead class="bg-gray-50 border-b border-gray-100"><tr>';
  for (const h of ['Producto','Marca','Supermercado','Precio Lista','Precio Oferta','Ahorro','%']) {
    const r = !['Producto','Marca','Supermercado'].includes(h)?'text-right':'text-left';
    html += '<th class="px-3 py-2.5 text-xs font-semibold text-gray-500 uppercase '+r+'">'+h+'</th>';
  }
  html += '</tr></thead><tbody class="divide-y divide-gray-50">';
  for (const p of offers) {
    const isBimbo = BIMBO_BRANDS.has(p.brand);
    html += '<tr class="hover:bg-green-50/20">';
    html += '<td class="px-3 py-2.5 font-medium text-gray-800 max-w-48"><a href="'+(p.url||'#')+'" target="_blank" class="hover:text-blue-600 text-xs">'+p.name+'</a></td>';
    html += '<td class="px-3 py-2.5"><span class="text-xs px-2 py-0.5 rounded-full font-semibold '+(isBimbo?'bg-red-100 text-red-700':'bg-gray-100 text-gray-600')+'">'+p.brand+'</span></td>';
    html += '<td class="px-3 py-2.5">'+superBadge(p.supermarket)+'</td>';
    html += '<td class="px-3 py-2.5 text-right text-gray-400 line-through text-xs">'+fmt(p.regularPrice)+'</td>';
    html += '<td class="px-3 py-2.5 text-right text-green-700 font-semibold">'+fmt(p.publishedPrice)+'</td>';
    html += '<td class="px-3 py-2.5 text-right text-green-600 text-xs font-medium">'+fmt((p.regularPrice||0)-p.publishedPrice)+'</td>';
    html += '<td class="px-3 py-2.5 text-right"><span class="bg-green-100 text-green-700 text-xs px-2 py-0.5 rounded font-bold">-'+p.discount+'%</span></td>';
    html += '</tr>';
  }
  html += '</tbody></table></div>';
  document.getElementById('content-ofertas').innerHTML = html;
}

window.onload = init;
</script>
</body>
</html>
