const SUPERS = ['Tata','Disco','Tienda Inglesa','El Dorado'];
const BIMBO_BRANDS = new Set(['Bimbo','Artesano','Nutrabien','Tia Rosa']);
const CATEGORIES = ['Pan de Molde','Pan de Tortuga','Pan de Viena'];
const SUPER_COLORS = {
  'Tata':'bg-orange-100 text-orange-800 border-orange-200',
  'Disco':'bg-purple-100 text-purple-800 border-purple-200',
  'Tienda Inglesa':'bg-red-100 text-red-800 border-red-200',
  'El Dorado':'bg-yellow-100 text-yellow-800 border-yellow-200',
};
let activeCategory = 'Pan de Molde';
let activeTab = 'bimbo';

function detectCategory(name, brand) {
  const n = (name+' '+(brand||'')).toLowerCase();
  if (n.includes('tortuga')||n.includes('hamburguesa')||n.includes('hot dog')||n.includes('hotdog')||n.includes('perrito')) return 'Pan de Tortuga';
  if (n.includes('viena')||n.includes('vienes')||n.includes('frances')||n.includes('francés')||n.includes('baguette')||n.includes('sorchante')||n.includes('cubano')||n.includes('criollito')) return 'Pan de Viena';
  if (n.includes('lactal')||n.includes('molde')||n.includes('sandwich')||n.includes('integral')||n.includes('blanco')||n.includes('artesano')||n.includes('nutrabien')||n.includes('brioche')||n.includes('tia rosa')||n.includes('tiarosa')) return 'Pan de Molde';
  if (n.includes('rapidita')||n.includes('salma')||n.includes('takis')||n.includes('merienda hit')) return 'Otro';
  if (brand==='Bimbo'||brand==='Artesano'||brand==='Nutrabien'||brand==='Tia Rosa') return 'Pan de Molde';
  if (brand==='Los Sorchantes'||brand==='Maestro Cubano') return 'Pan de Viena';
  return 'Otro';
}

function fmt(n) { return n!=null ? '$'+Math.round(n).toLocaleString('es-UY') : '—'; }

function superBadge(s) {
  const c = SUPER_COLORS[s]||'bg-gray-100 text-gray-700 border-gray-200';
  return '<span class="text-xs px-2 py-0.5 rounded-full font-medium border '+c+'">'+s+'</span>';
}

function init() {
  // Stats
  const allP = PRODUCTS;
  document.getElementById('stat-total').textContent = allP.length;
  document.getElementById('stat-brands').textContent = new Set(allP.map(p=>p.brand)).size;
  document.getElementById('stat-supers').textContent = new Set(allP.map(p=>p.supermarket)).size+'/4';
  const offers = allP.filter(p=>p.offerPrice);
  document.getElementById('stat-offers').textContent = offers.length;
  document.getElementById('badge-ofertas').textContent = offers.length||'';
  // Last update
  if (allP.length) {
    const d = new Date(allP[0].scrapedAt);
    document.getElementById('lastUpdate').textContent = d.toLocaleString('es-UY',{dateStyle:'medium',timeStyle:'short'});
  }
  renderBimbo();
  renderCatalogo();
  renderOfertas();
}

function setTab(t) {
  activeTab = t;
  ['bimbo','catalogo','ofertas'].forEach(id => {
    const btn = document.getElementById('tab-'+id);
    const cont = document.getElementById('content-'+id);
    if (id===t) {
      btn.className = btn.className.replace('border-transparent text-gray-500','border-red-600 text-red-600');
      cont.style.display='';
    } else {
      btn.className = btn.className.replace('border-red-600 text-red-600','border-transparent text-gray-500');
      cont.style.display='none';
    }
  });
}

function setCat(cat) {
  activeCategory = cat;
  renderBimbo();
  CATEGORIES.forEach(c => {
    const btn = document.getElementById('catbtn-'+c.replace(/ /g,'_'));
    if (btn) {
      if (c===cat) btn.className = 'tab-active px-4 py-2 rounded-xl text-sm font-semibold transition-all border';
      else btn.className = 'tab-inactive px-4 py-2 rounded-xl text-sm font-semibold transition-all border hover:border-red-300 hover:text-red-600';
    }
  });
}

function renderBimbo() {
  const cat = activeCategory;
  const catProds = PRODUCTS.filter(p => detectCategory(p.name, p.brand) === cat);
  const brands = [...new Set(catProds.map(p=>p.brand))].sort((a,b)=>{
    const ai = BIMBO_BRANDS.has(a)?0:1, bi = BIMBO_BRANDS.has(b)?0:1;
    return ai-bi || a.localeCompare(b,'es');
  });

  // Matrix
  const matrix = {};
  for (const b of brands) {
    matrix[b] = {};
    for (const s of SUPERS) {
      const ps = catProds.filter(p=>p.brand===b&&p.supermarket===s).sort((a,c)=>a.publishedPrice-c.publishedPrice);
      matrix[b][s] = ps[0]||null;
    }
  }
  const cheapPerSuper = {};
  const expPerSuper = {};
  for (const s of SUPERS) {
    const prices = brands.map(b=>matrix[b]?.[s]?.publishedPrice).filter(p=>p!=null);
    cheapPerSuper[s] = prices.length ? Math.min(...prices) : null;
    expPerSuper[s] = prices.length>1 ? Math.max(...prices) : null;
  }

  // Insights
  const bimboP = catProds.filter(p=>BIMBO_BRANDS.has(p.brand));
  const compP = catProds.filter(p=>!BIMBO_BRANDS.has(p.brand));
  const allSorted = [...catProds].sort((a,b)=>a.publishedPrice-b.publishedPrice);
  const cheapest = allSorted[0]||null;
  const bimboAvg = bimboP.length ? Math.round(bimboP.reduce((s,p)=>s+p.publishedPrice,0)/bimboP.length) : null;
  const compAvg = compP.length ? Math.round(compP.reduce((s,p)=>s+p.publishedPrice,0)/compP.length) : null;
  const priceDiff = bimboAvg&&compAvg ? Math.round(((bimboAvg-compAvg)/compAvg)*100) : null;
  const activeOffers = catProds.filter(p=>p.offerPrice&&p.discount).sort((a,b)=>(b.discount||0)-(a.discount||0));
  
  let bimboWins=0, totalComp=0;
  for (const s of SUPERS) {
    if (cheapPerSuper[s]===null) continue;
    totalComp++;
    const bPrices = bimboP.filter(p=>p.supermarket===s).map(p=>p.publishedPrice);
    if (bPrices.length && Math.min(...bPrices) <= cheapPerSuper[s]+0.01) bimboWins++;
  }

  const catCounts = Object.fromEntries(CATEGORIES.map(c=>[c, PRODUCTS.filter(p=>detectCategory(p.name,p.brand)===c).length]));

  // HTML
  let html = '';

  // Category buttons
  html += '<div class="flex gap-2 flex-wrap mb-5">';
  for (const c of CATEGORIES) {
    const id = 'catbtn-'+c.replace(/ /g,'_');
    const isCur = c===cat;
    html += '<button id="'+id+'" onclick="setCat(\''+c+'\')" class="'+(isCur?'tab-active':'tab-inactive')+' px-4 py-2 rounded-xl text-sm font-semibold transition-all border">'+c+
      '<span class="ml-2 text-xs px-1.5 py-0.5 rounded-full '+(isCur?'bg-red-500 text-white':'bg-gray-100 text-gray-400')+'">'+catCounts[c]+'</span></button>';
  }
  html += '</div>';

  if (catProds.length===0) {
    html += '<div class="bg-white rounded-2xl border border-gray-200 p-12 text-center text-gray-400"><div class="text-4xl mb-3">🍞</div><p>No hay productos de <strong>'+cat+'</strong> en los datos actuales.</p></div>';
    document.getElementById('content-bimbo').innerHTML = html;
    return;
  }

  // Insight cards
  html += '<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">';
  // Cheapest
  html += '<div class="bg-green-50 border border-green-200 rounded-xl p-4"><div class="text-xs font-bold text-green-600 uppercase tracking-wider mb-1">Más barato</div>';
  if (cheapest) {
    html += '<div class="text-2xl font-black text-green-700">'+fmt(cheapest.publishedPrice)+'</div>';
    html += '<div class="text-xs text-green-600 mt-1 font-medium truncate">'+cheapest.brand+'</div>';
    html += superBadge(cheapest.supermarket);
  }
  html += '</div>';
  // Bimbo vs comp
  const diffColor = priceDiff!=null&&priceDiff>5?'bg-red-50 border-red-200':priceDiff!=null&&priceDiff<-5?'bg-green-50 border-green-200':'bg-white border-gray-200';
  html += '<div class="'+diffColor+' border rounded-xl p-4"><div class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Bimbo vs Comp.</div>';
  if (bimboAvg&&compAvg) {
    const c2 = priceDiff>5?'text-red-600':priceDiff<-5?'text-green-600':'text-gray-800';
    html += '<div class="text-2xl font-black '+c2+'">'+(priceDiff>0?'+':'')+priceDiff+'%</div>';
    html += '<div class="text-xs text-gray-500 mt-1">Bimbo: '+fmt(bimboAvg)+'</div>';
    html += '<div class="text-xs text-gray-400">Comp: '+fmt(compAvg)+'</div>';
  } else if (bimboAvg) {
    html += '<div class="text-2xl font-black text-blue-600">'+fmt(bimboAvg)+'</div><div class="text-xs text-gray-400 mt-1">sin competencia</div>';
  } else html += '<div class="text-gray-400 text-sm">Sin prod. Bimbo</div>';
  html += '</div>';
  // Ofertas
  html += '<div class="'+(activeOffers.length>0?'bg-orange-50 border-orange-200':'bg-white border-gray-200')+' border rounded-xl p-4"><div class="text-xs font-bold text-orange-600 uppercase tracking-wider mb-1">Ofertas activas</div>';
  html += '<div class="text-2xl font-black text-orange-600">'+activeOffers.length+'</div>';
  html += '<div class="text-xs text-orange-600 mt-1">Bimbo: '+(bimboP.filter(p=>p.offerPrice).length)+' · Comp: '+(compP.filter(p=>p.offerPrice).length)+'</div></div>';
  // Position
  html += '<div class="bg-blue-50 border border-blue-200 rounded-xl p-4"><div class="text-xs font-bold text-blue-600 uppercase tracking-wider mb-1">Posición Bimbo</div>';
  if (totalComp>0) {
    html += '<div class="text-2xl font-black text-blue-700">'+bimboWins+'/'+totalComp+'</div>';
    html += '<div class="text-xs text-blue-600 mt-1">supers donde es más barato</div>';
  } else html += '<div class="text-gray-400 text-sm">Sin datos</div>';
  html += '</div></div>';

  // Matrix
  html += '<div class="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm mb-5">';
  html += '<div class="px-5 py-3.5 border-b border-gray-100 flex items-center justify-between">';
  html += '<div><h3 class="font-bold text-gray-800 text-sm">Precio mínimo por marca y supermercado</h3>';
  html += '<p class="text-xs text-gray-400 mt-0.5">Verde = más barato · Rojo = más caro · 🏷 = en oferta</p></div>';
  html += '<div class="flex items-center gap-3 text-xs"><span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-red-600 inline-block"></span> Bimbo Group</span>';
  html += '<span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-gray-400 inline-block"></span> Competencia</span></div></div>';
  html += '<div class="overflow-x-auto"><table class="w-full text-sm">';
  html += '<thead><tr class="bg-gray-50 border-b border-gray-100">';
  html += '<th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider min-w-36">Marca</th>';
  for (const s of SUPERS) html += '<th class="px-3 py-3 text-center text-xs font-semibold text-gray-500 uppercase tracking-wider min-w-28">'+s+'</th>';
  html += '</tr></thead><tbody class="divide-y divide-gray-50">';

  for (let bi=0; bi<brands.length; bi++) {
    const brand = brands[bi];
    const isBimbo = BIMBO_BRANDS.has(brand);
    const isLastBimbo = isBimbo && (bi===brands.length-1 || !BIMBO_BRANDS.has(brands[bi+1]));
    html += '<tr class="'+(isBimbo?'bimbo-row':'')+(isLastBimbo?' border-b-2 border-gray-200':'')+' hover:bg-blue-50/20 transition-colors">';
    html += '<td class="px-4 py-3"><div class="flex items-center gap-2">';
    html += '<div class="w-2 h-2 rounded-full flex-shrink-0 '+(isBimbo?'bg-red-500':'bg-gray-400')+'"></div>';
    html += '<span class="font-semibold text-sm '+(isBimbo?'text-red-800':'text-gray-700')+'">'+brand+'</span>';
    if (isBimbo) html += '<span class="text-xs bg-red-100 text-red-600 px-1.5 py-0.5 rounded font-bold">B</span>';
    html += '</div></td>';
    for (const s of SUPERS) {
      const prod = matrix[brand]?.[s]||null;
      if (!prod) { html += '<td class="px-3 py-3 text-center text-gray-200">—</td>'; continue; }
      const isCheap = cheapPerSuper[s]!==null && prod.publishedPrice <= cheapPerSuper[s]+0.01;
      const isExp = expPerSuper[s]!==null && prod.publishedPrice >= expPerSuper[s]-0.01;
      const isOffer = !!prod.offerPrice;
      const cellClass = isCheap?'cell-cheap':isExp?'cell-exp':'cell-normal';
      const priceColor = isCheap?'text-green-700':isExp?'text-red-600':'text-gray-800';
      html += '<td class="px-3 py-3 text-center"><a href="'+(prod.url||'#')+'" target="_blank" class="block group">';
      html += '<div class="inline-flex flex-col items-center rounded-lg px-2.5 py-1.5 border '+cellClass+(isOffer?' cell-offer':'')+' group-hover:shadow-sm transition-all">';
      html += '<div class="font-bold text-sm '+priceColor+'">'+fmt(prod.publishedPrice)+'</div>';
      if (isOffer) html += '<div class="text-xs text-gray-400 line-through leading-none">'+fmt(prod.regularPrice)+'</div>';
      html += '<div class="flex items-center gap-1 mt-0.5">';
      if (isCheap) html += '<span class="text-green-600 text-xs font-bold">✓ min</span>';
      else if (isExp) html += '<span class="text-red-500 text-xs">↑ max</span>';
      if (isOffer) html += '<span class="text-xs bg-orange-100 text-orange-600 px-1 rounded font-bold">🏷 -'+prod.discount+'%</span>';
      html += '</div></div></a></td>';
    }
    html += '</tr>';
  }
  html += '</tbody><tfoot><tr class="bg-gray-100 border-t-2 border-gray-200">';
  html += '<td class="px-4 py-2.5 text-xs font-bold text-gray-500 uppercase">Mejor precio</td>';
  for (const s of SUPERS) html += '<td class="px-3 py-2.5 text-center">'+(cheapPerSuper[s]!==null?'<span class="text-green-700 font-bold text-sm">'+fmt(cheapPerSuper[s])+'</span>':'<span class="text-gray-300">—</span>')+'</td>';
  html += '</tr></tfoot></table></div></div>';

  // Offers detail
  if (activeOffers.length>0) {
    html += '<div class="bg-white rounded-2xl border border-orange-200 overflow-hidden shadow-sm mb-5">';
    html += '<div class="px-5 py-3.5 border-b border-orange-100 bg-orange-50"><h3 class="font-bold text-orange-700 text-sm">🏷 Ofertas activas en '+cat+'</h3></div>';
    html += '<div class="divide-y divide-gray-50">';
    for (const p of activeOffers) {
      const isBimbo = BIMBO_BRANDS.has(p.brand);
      html += '<div class="px-5 py-3 flex items-center justify-between gap-4">';
      html += '<div class="flex-1 min-w-0"><a href="'+(p.url||'#')+'" target="_blank" class="font-medium text-sm text-gray-800 hover:text-blue-600 block truncate">'+p.name+'</a>';
      html += '<div class="flex items-center gap-2 mt-1"><span class="text-xs font-semibold '+(isBimbo?'text-red-600':'text-gray-500')+'">'+p.brand+'</span>'+superBadge(p.supermarket)+'</div></div>';
      html += '<div class="text-right flex-shrink-0"><div class="text-xs text-gray-400 line-through">'+fmt(p.regularPrice)+'</div>';
      html += '<div class="font-bold text-green-700 text-base">'+fmt(p.publishedPrice)+'</div>';
      html += '<span class="bg-orange-100 text-orange-600 text-xs font-bold px-2 py-0.5 rounded">-'+p.discount+'%</span></div></div>';
    }
    html += '</div></div>';
  }

  // All products table
  html += '<div class="bg-white rounded-2xl border border-gray-200 overflow-hidden">';
  html += '<div class="px-5 py-3.5 border-b border-gray-100"><h3 class="font-bold text-gray-800 text-sm">Todos los productos — '+cat+'</h3>';
  html += '<p class="text-xs text-gray-400 mt-0.5">'+catProds.length+' productos</p></div>';
  html += '<div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50 border-b border-gray-100"><tr>';
  for (const h of ['Producto','Marca','Supermercado','Precio','Regular','Oferta','Dto.']) {
    const r = h==='Precio'||h==='Regular'||h==='Oferta'||h==='Dto.' ? 'text-right' : 'text-left';
    html += '<th class="px-3 py-2.5 text-xs font-semibold text-gray-500 uppercase tracking-wider '+r+'">'+h+'</th>';
  }
  html += '</tr></thead><tbody class="divide-y divide-gray-50">';
  const sorted = [...catProds].sort((a,b)=>a.brand.localeCompare(b.brand,'es')||a.publishedPrice-b.publishedPrice);
  for (const p of sorted) {
    const isBimbo = BIMBO_BRANDS.has(p.brand);
    html += '<tr class="hover:bg-blue-50/20 transition-colors '+(isBimbo?'bg-red-50/20':'')+'">';
    html += '<td class="px-3 py-2.5 max-w-52"><a href="'+(p.url||'#')+'" target="_blank" class="font-medium text-gray-800 hover:text-blue-600 text-xs" title="'+p.name+'">'+p.name+'</a></td>';
    html += '<td class="px-3 py-2.5"><span class="text-xs px-2 py-0.5 rounded-full font-semibold '+(isBimbo?'bg-red-100 text-red-700':'bg-gray-100 text-gray-600')+'">'+p.brand+'</span></td>';
    html += '<td class="px-3 py-2.5">'+superBadge(p.supermarket)+'</td>';
    html += '<td class="px-3 py-2.5 text-right font-semibold text-gray-900">'+fmt(p.publishedPrice)+'</td>';
    html += '<td class="px-3 py-2.5 text-right text-gray-400 text-xs">'+fmt(p.regularPrice)+'</td>';
    html += '<td class="px-3 py-2.5 text-right text-green-600 font-medium text-xs">'+fmt(p.offerPrice)+'</td>';
    html += '<td class="px-3 py-2.5 text-right">'+(p.discount?'<span class="bg-green-100 text-green-700 text-xs px-1.5 py-0.5 rounded font-bold">-'+p.discount+'%</span>':'<span class="text-gray-200">—</span>')+'</td>';
    html += '</tr>';
  }
  html += '</tbody></table></div></div>';

  document.getElementById('content-bimbo').innerHTML = html;
}

function renderCatalogo() {
  let html = '<div class="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm">';
  html += '<div class="p-4 border-b border-gray-100"><input type="text" id="catSearch" oninput="filterCat()" placeholder="🔍 Buscar producto o marca..." class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm w-full focus:outline-none focus:ring-2 focus:ring-blue-500"></div>';
  html += '<div class="overflow-x-auto"><table class="w-full text-sm" id="catTable">';
  html += '<thead class="bg-gray-50 border-b border-gray-100"><tr>';
  for (const h of ['Producto','Marca','Supermercado','Precio','Regular','Oferta','Dto.']) {
    const r = !['Producto','Marca','Supermercado'].includes(h)?'text-right':'text-left';
    html += '<th class="px-3 py-2.5 text-xs font-semibold text-gray-500 uppercase tracking-wider '+r+'">'+h+'</th>';
  }
  html += '</tr></thead><tbody class="divide-y divide-gray-50">';
  const sorted = [...PRODUCTS].sort((a,b)=>a.brand.localeCompare(b.brand,'es')||a.name.localeCompare(b.name,'es')||a.supermarket.localeCompare(b.supermarket,'es'));
  for (const p of sorted) {
    const isBimbo = BIMBO_BRANDS.has(p.brand);
    html += '<tr class="cat-row hover:bg-blue-50/20 transition-colors '+(isBimbo?'bg-red-50/20':'')+'" data-search="'+(p.name+' '+p.brand+' '+p.supermarket).toLowerCase()+'">';
    html += '<td class="px-3 py-2.5 max-w-52"><a href="'+(p.url||'#')+'" target="_blank" class="font-medium text-gray-800 hover:text-blue-600 text-xs">'+p.name+'</a></td>';
    html += '<td class="px-3 py-2.5"><span class="text-xs px-2 py-0.5 rounded-full font-semibold '+(isBimbo?'bg-red-100 text-red-700':'bg-gray-100 text-gray-600')+'">'+p.brand+'</span></td>';
    html += '<td class="px-3 py-2.5">'+superBadge(p.supermarket)+'</td>';
    html += '<td class="px-3 py-2.5 text-right font-semibold text-gray-900">'+fmt(p.publishedPrice)+'</td>';
    html += '<td class="px-3 py-2.5 text-right text-gray-400 text-xs">'+fmt(p.regularPrice)+'</td>';
    html += '<td class="px-3 py-2.5 text-right text-green-600 font-medium text-xs">'+fmt(p.offerPrice)+'</td>';
    html += '<td class="px-3 py-2.5 text-right">'+(p.discount?'<span class="bg-green-100 text-green-700 text-xs px-1.5 py-0.5 rounded font-bold">-'+p.discount+'%</span>':'<span class="text-gray-200">—</span>')+'</td>';
    html += '</tr>';
  }
  html += '</tbody></table></div></div>';
  document.getElementById('content-catalogo').innerHTML = html;
}

function filterCat() {
  const q = document.getElementById('catSearch').value.toLowerCase();
  document.querySelectorAll('.cat-row').forEach(r => {
    r.style.display = r.dataset.search.includes(q) ? '' : 'none';
  });
}

function renderOfertas() {
  const offers = PRODUCTS.filter(p=>p.offerPrice&&p.discount).sort((a,b)=>(b.discount||0)-(a.discount||0));
  if (!offers.length) {
    document.getElementById('content-ofertas').innerHTML = '<div class="text-center py-16 text-gray-400"><div class="text-4xl mb-3">🏷️</div><p>No hay ofertas activas.</p></div>';
    return;
  }
  let html = '<p class="text-sm text-gray-500 mb-4">'+offers.length+' productos con descuento activo, ordenados por mayor ahorro.</p>';
  html += '<div class="bg-white rounded-2xl border border-gray-200 overflow-hidden"><table class="w-full text-sm">';
  html += '<thead class="bg-gray-50 border-b border-gray-100"><tr>';
  for (const h of ['Producto','Marca','Supermercado','Precio Lista','Precio Oferta','Ahorro','%']) {
    const r = !['Producto','Marca','Supermercado'].includes(h)?'text-right':'text-left';
    html += '<th class="px-3 py-2.5 text-xs font-semibold text-gray-500 uppercase '+r+'">'+h+'</th>';
  }
  html += '</tr></thead><tbody class="divide-y divide-gray-50">';
  for (const p of offers) {
    const isBimbo = BIMBO_BRANDS.has(p.brand);
    html += '<tr class="hover:bg-green-50/20">';
    html += '<td class="px-3 py-2.5 font-medium text-gray-800 max-w-48"><a href="'+(p.url||'#')+'" target="_blank" class="hover:text-blue-600 text-xs">'+p.name+'</a></td>';
    html += '<td class="px-3 py-2.5"><span class="text-xs px-2 py-0.5 rounded-full font-semibold '+(isBimbo?'bg-red-100 text-red-700':'bg-gray-100 text-gray-600')+'">'+p.brand+'</span></td>';
    html += '<td class="px-3 py-2.5">'+superBadge(p.supermarket)+'</td>';
    html += '<td class="px-3 py-2.5 text-right text-gray-400 line-through text-xs">'+fmt(p.regularPrice)+'</td>';
    html += '<td class="px-3 py-2.5 text-right text-green-700 font-semibold">'+fmt(p.publishedPrice)+'</td>';
    html += '<td class="px-3 py-2.5 text-right text-green-600 text-xs font-medium">'+fmt(p.regularPrice-p.publishedPrice)+'</td>';
    html += '<td class="px-3 py-2.5 text-right"><span class="bg-green-100 text-green-700 text-xs px-2 py-0.5 rounded font-bold">-'+p.discount+'%</span></td>';
    html += '</tr>';
  }
  html += '</tbody></table></div>';
  document.getElementById('content-ofertas').innerHTML = html;
}

window.onload = init;
</script>
</body>
</html>
